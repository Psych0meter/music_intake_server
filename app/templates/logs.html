<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logs - Music Intake</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .log-line { font-family: 'Monaco', 'Menlo', monospace; font-size: 12px; line-height: 1.5; }
    .log-error { color: #ef4444; }
    .log-warn { color: #f59e0b; }
    .log-info { color: #3b82f6; }
    .log-debug { color: #6b7280; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

  <div class="w-full px-6 py-8">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-3xl font-bold text-gray-900">System Logs</h1>
        <p class="text-sm text-gray-500 mt-1">View recognize and web UI logs</p>
      </div>
      <a href="/" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700">Back to Queue</a>
    </div>

    <div class="space-y-6">
      {% for name, log in logs.items() %}
      <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
        <div class="bg-gray-50 px-4 py-3 border-b border-gray-200 flex items-center justify-between">
          <h2 class="text-lg font-semibold text-gray-900">{{ name|capitalize }} Log</h2>
          <span class="text-xs text-gray-500 font-mono">{{ log.path }}</span>
        </div>
        <div class="p-4">
          {% if log.error %}
          <p class="text-rose-600 text-sm">{{ log.error }}</p>
          {% else %}
          <div class="bg-gray-900 text-green-400 p-4 rounded-lg overflow-auto max-h-[500px]">
            {% for line in log.content %}
            <div class="log-line {% if '[error]' in line.lower() or 'failed' in line.lower() %}log-error{% elif '[warn]' in line.lower() or 'warning' in line.lower() %}log-warn{% elif '[info]' in line.lower() or 'queued' in line.lower() or 'scanning' in line.lower() %}log-info{% else %}log-debug{% endif %}">{{ line }}</div>
            {% endfor %}
          </div>
          {% endif %}
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
