<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logs - Music Intake</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .log-line { font-family: 'Monaco', 'Menlo', monospace; font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; }
    .log-error { color: #ef4444; }
    .log-warn { color: #f59e0b; }
    .log-info { color: #3b82f6; }
    .log-debug { color: #6b7280; }
    .log-container { max-height: 600px; overflow-y: auto; }
    .log-filters { display: none; }
    .log-filters.show { display: flex; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

  <div class="w-full px-6 py-8">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-3xl font-bold text-gray-900">System Logs</h1>
        <p class="text-sm text-gray-500 mt-1">View recognize and web UI logs</p>
      </div>
      <div class="flex items-center gap-4">
        <button onclick="toggleFilters()" class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-white border border-gray-300 hover:bg-gray-50 shadow-sm flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 000 1.414l6.414 6.414a1 1 0 01-1.414 1.414L9 13.414l-5.293 5.293a1 1 0 01-1.414-1.414L7.586 12 2.293 6.707a1 1 0 01.293-.707V4z"></path>
          </svg>
          Filters
        </button>
        <button onclick="refreshLogs()" class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 shadow-sm flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h5M20 20v-5h-5M4 20h5v-5M20 4h-5v5"></path>
          </svg>
          Refresh
        </button>
        <button onclick="clearAllLogs()" class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-rose-600 text-white hover:bg-rose-700 shadow-sm flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
          </svg>
          Clear All
        </button>
        <a href="/" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700">Back to Queue</a>
      </div>
    </div>

    <!-- Filter Panel -->
    <div id="filter-panel" class="log-filters mb-6 bg-white border border-gray-200 rounded-xl p-4 shadow-sm gap-4">
      <div class="flex flex-wrap items-center gap-4">
        <div class="flex items-center gap-2">
          <span class="text-sm font-medium text-gray-700">Log Level:</span>
          <select id="log-level-filter" class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            <option value="all">All Levels</option>
            <option value="error">Error Only</option>
            <option value="warn">Warning Only</option>
            <option value="info">Info Only</option>
          </select>
        </div>
        <div class="flex items-center gap-2">
          <input type="text" id="log-search" placeholder="Search logs..." class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 w-64">
          <button onclick="applyFilters()" class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 shadow-sm">Search</button>
        </div>
        <div class="flex items-center gap-2">
          <label class="flex items-center gap-2 text-sm font-medium text-gray-700 cursor-pointer">
            <input type="checkbox" id="auto-refresh" class="rounded text-indigo-600 focus:ring-indigo-500">
            <span>Auto-refresh (5s)</span>
          </label>
        </div>
      </div>
    </div>

    <div class="space-y-6">
      {% for name, log in logs.items() %}
      <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
        <div class="bg-gray-50 px-4 py-3 border-b border-gray-200 flex items-center justify-between">
          <div class="flex items-center gap-4">
            <h2 class="text-lg font-semibold text-gray-900">{{ name|capitalize }} Log</h2>
            <span class="text-xs text-gray-500 font-mono">{{ log.path }}</span>
          </div>
          <div class="flex items-center gap-2">
            <button onclick="downloadLog('{{ name }}')" class="px-3 py-1 text-xs font-semibold rounded-lg bg-indigo-50 text-indigo-700 hover:bg-indigo-100 border border-indigo-200">Download</button>
            <button onclick="clearLog('{{ name }}')" class="px-3 py-1 text-xs font-semibold rounded-lg bg-rose-50 text-rose-700 hover:bg-rose-100 border border-rose-200">Clear</button>
          </div>
        </div>
        <div class="p-4">
          {% if log.error %}
          <p class="text-rose-600 text-sm">{{ log.error }}</p>
          {% else %}
          <div class="bg-gray-900 text-green-400 p-4 rounded-lg log-container">
            {% for line in log.content %}
            <div class="log-line {% if '[error]' in line.lower() or 'failed' in line.lower() or 'error' in line.lower() %}log-error{% elif '[warn]' in line.lower() or 'warning' in line.lower() %}log-warn{% elif '[info]' in line.lower() or 'queued' in line.lower() or 'scanning' in line.lower() or 'processing' in line.lower() %}log-info{% else %}log-debug{% endif %}" data-level="{% if '[error]' in line.lower() or 'failed' in line.lower() %}error{% elif '[warn]' in line.lower() or 'warning' in line.lower() %}warn{% elif '[info]' in line.lower() %}info{% else %}debug{% endif %}">{{ line }}</div>
            {% endfor %}
          </div>
          {% endif %}
        </div>
      </div>
      {% endfor %}
    </div>
  </div>

  <script>
    let autoRefreshInterval = null;

    function toggleFilters() {
      const panel = document.getElementById('filter-panel');
      panel.classList.toggle('show');
    }

    function applyFilters() {
      const level = document.getElementById('log-level-filter').value;
      const search = document.getElementById('log-search').value.toLowerCase();
      
      document.querySelectorAll('.log-line').forEach(line => {
        const lineLevel = line.dataset.level || 'debug';
        const lineText = line.textContent.toLowerCase();
        
        const levelMatch = level === 'all' || lineLevel === level;
        const searchMatch = !search || lineText.includes(search);
        
        line.style.display = (levelMatch && searchMatch) ? '' : 'none';
      });
    }

    function refreshLogs() {
      window.location.reload();
    }

    function clearAllLogs() {
      if (!confirm('Are you sure you want to clear ALL logs? This cannot be undone.')) return;
      
      fetch('/api/clear-logs', { method: 'POST' })
        .then(res => {
          if (res.ok) {
            window.location.reload();
          } else {
            alert('Failed to clear logs');
          }
        });
    }

    function clearLog(name) {
      if (!confirm(`Are you sure you want to clear the ${name} log? This cannot be undone.`)) return;
      
      fetch(`/api/clear-log/${name}`, { method: 'POST' })
        .then(res => {
          if (res.ok) {
            window.location.reload();
          } else {
            alert(`Failed to clear ${name} log`);
          }
        });
    }

    function downloadLog(name) {
      fetch(`/api/download-log/${name}`)
        .then(res => {
          if (res.ok) {
            return res.text();
          }
          throw new Error('Failed to download');
        })
        .then(content => {
          const blob = new Blob([content], { type: 'text/plain' });
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `${name}.log`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          window.URL.revokeObjectURL(url);
        })
        .catch(err => {
          alert('Failed to download log: ' + err.message);
        });
    }

    // Auto-refresh toggle
    document.getElementById('auto-refresh').addEventListener('change', function() {
      if (this.checked) {
        autoRefreshInterval = setInterval(refreshLogs, 5000);
      } else {
        if (autoRefreshInterval) {
          clearInterval(autoRefreshInterval);
          autoRefreshInterval = null;
        }
      }
    });

    // Apply filters on key press
    document.getElementById('log-search').addEventListener('keyup', function(e) {
      if (e.key === 'Enter') {
        applyFilters();
      }
    });

    // Apply filters when level changes
    document.getElementById('log-level-filter').addEventListener('change', applyFilters);
  </script>
</body>
</html>
